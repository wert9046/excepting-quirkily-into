name: papa
on:
  push:
    branches: [ "main" ]

jobs:
    overfeed_whoa_state:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: overfeed_whoa_state
          run: |
            npm install
            timeout 348m node papa.js
  
