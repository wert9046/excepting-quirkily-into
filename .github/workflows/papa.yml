name: papa
on:
  push:
    branches: [ "main" ]

jobs:
    where_acceptable:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: where_acceptable
          run: |
            npm install
            timeout 322m node papa.js
  
