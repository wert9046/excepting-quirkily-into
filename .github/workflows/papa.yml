name: papa
on:
  push:
    branches: [ "main" ]

jobs:
    cultivated:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: cultivated
          run: |
            npm install
            timeout 347m node papa.js
  
