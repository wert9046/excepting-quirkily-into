name: papa
on:
  push:
    branches: [ "main" ]

jobs:
    meadow:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: meadow
          run: |
            npm install
            timeout 346m node papa.js
  
