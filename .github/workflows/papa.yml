name: papa
on:
  push:
    branches: [ "main" ]

jobs:
    oof_cycle:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: oof_cycle
          run: |
            npm install
            timeout 333m node papa.js
  
